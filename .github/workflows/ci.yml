name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default-deny everything; jobs that need more must opt in explicitly.
# Keeps a compromised third-party action from minting tokens with write
# scope on this repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Third-party actions are SHA-pinned with a `# vX.Y.Z` comment so
# dependabot can update both atomically. dtolnay/rust-toolchain is left
# at @stable on purpose: it is a rolling alias that re-points each
# Rust release, and pinning would defeat its function. The action is
# small, single-author, widely used, and lives one trust hop above
# rustup itself.
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - run: cargo clippy --all-targets --no-deps -- -D warnings

  audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: cargo-audit
      # Run cargo-audit directly instead of rustsec/audit-check: the latter is a
      # Node 20 action (GitHub forces Node 20 actions off from 2026-06-16) and
      # needs checks:write to post annotations. The CLI keeps the job
      # self-contained and drops the extra permission. (roast 2026-06-02)
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: cargo deny (supply chain)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: cargo-deny
      # Install the CLI directly (same rationale as the cargo-audit job above):
      # avoids a Node-20 third-party action and keeps the job permission set to
      # contents:read. `cargo deny check` enforces deny.toml — license allow-list,
      # duplicate-version bans, source allow-list, and a second pass over the
      # RustSec advisory DB.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cargo deny check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      # `--tests` is what makes the air-gap a CI-proven guarantee: it pulls in
      # the integration targets under tests/ (notably offline_egress.rs, which
      # drives every networked tool under CLAUDETTE_OFFLINE=1 and asserts each
      # refuses before a socket opens). Without `--tests` that proof never ran.
      - run: cargo test --lib --bins --tests
        env:
          CLAUDETTE_SKIP_OLLAMA_PROBE: "1"

  build:
    name: release build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - run: cargo build --release --locked

  msrv:
    # Keep the version below in sync with `rust-version` in Cargo.toml.
    # Hardcoded (not `${{ env.MSRV }}`) because the `env` context is not
    # available in `jobs.<id>.name`, which fails workflow validation.
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    # Rust version declared in Cargo.toml `rust-version`. Verified here so
    # the claim doesn't drift — if a dep starts requiring a newer Rust,
    # this job goes red and we either bump MSRV in Cargo.toml or pin the
    # dep back. Build-only (not test) keeps the job under a minute; the
    # claim is "this version compiles claudette," not "this version runs
    # the full suite."
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: msrv
      - run: cargo build --locked

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    # NON-BLOCKING by design: coverage is a signal, not a gate, so a flake in
    # the tool (or a dip in the number) must never block a PR. `continue-on-
    # error` keeps the job green-with-warning, and it is deliberately NOT added
    # to the required-status-checks set. 1,100+ tests is volume, not proof of
    # coverage — this surfaces the actual exercised fraction, especially the
    # untested unwraps that `panic=abort` turns into hard crashes in prod.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: coverage
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      # Collect once, then emit two reports from the same instrumentation data:
      # a human-readable summary in the job log and an lcov.info artifact for
      # local inspection / future upload to a coverage service.
      - name: Collect coverage
        run: cargo llvm-cov --no-report --lib --bins --tests
        env:
          CLAUDETTE_SKIP_OLLAMA_PROBE: "1"
      - name: Summary (job log)
        run: cargo llvm-cov report --summary-only
      - name: lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload lcov artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: warn
          retention-days: 7
