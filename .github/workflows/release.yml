name: Release

# Triggered by pushing a v-prefix tag (e.g. `git tag v0.2.3 && git push --tags`).
# Three things happen, in order:
#   1. `verify`           — full test/clippy/fmt gate on the tagged commit.
#   2. `tag-version-match`— guards against forgot-to-bump in release prep.
#   3. `publish`          — `cargo publish` to crates.io via OIDC (no stored
#                           token); idempotent (already-published = success).
#                           `build-binaries` matrix produces prebuilt archives
#                           for win/linux/macos in parallel.
#   4. `release`          — once every matrix leg is green (independent of the
#                           crates.io publish), attach all binary archives +
#                           their SHA256 sidecars to a GitHub Release with
#                           auto-generated notes.
#
# One-time setup on crates.io (UI):
#   1. Visit https://crates.io/crates/claudette/settings (logged in as
#      a crate owner).
#   2. Under "Trusted Publishers" → Add → GitHub.
#   3. Repository owner = mrdushidush, repository name = claudette,
#      workflow filename = release.yml. Environment may be left blank.
#   4. Save.
# After that, every tagged push runs through this workflow without any
# rotating tokens or secrets to manage.

on:
  push:
    tags:
      - "v*"
  # Manual dry-run: build the binary matrix without publishing to crates.io
  # or cutting a GitHub Release. Lets us validate matrix changes (e.g. a new
  # runner image, a target triple swap) before tagging v* for real. Runs the
  # `verify` and `build-binaries` jobs; skips `publish` and `release`.
  workflow_dispatch:

# Default-deny everything; the publish job opts back into id-token:write
# for the OIDC exchange. contents:read is needed for actions/checkout.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --no-deps -- -D warnings
      # `--tests` includes the integration targets under tests/ (notably
      # offline_egress.rs, the end-to-end air-gap proof) so a release can't ship
      # with the flagship guarantee silently broken.
      - run: cargo test --lib --bins --tests
        env:
          CLAUDETTE_SKIP_OLLAMA_PROBE: "1"

  tag-version-match:
    name: tag matches Cargo.toml + Cargo.lock version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Compare tag to package version
        # Tag format `v0.2.3` must match the `version = "0.2.3"` line in
        # Cargo.toml *and* the claudette entry in Cargo.lock. A stale lockfile
        # (bumped Cargo.toml but forgot `cargo update -p claudette`) sails past
        # a Cargo.toml-only check and then fails the expensive `--locked`
        # publish/build jobs minutes later — catch it here in seconds.
        # Skipped on workflow_dispatch (dry-run) — there is no tag to compare.
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver="$(grep -E '^version = ' crates/claudette/Cargo.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')"
          lock_ver="$(grep -A1 '^name = "claudette"$' Cargo.lock | grep -E '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')"
          echo "tag = $tag"
          echo "crates/claudette/Cargo.toml version = $ver"
          echo "Cargo.lock claudette version = $lock_ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag $tag does not match crates/claudette/Cargo.toml version $ver"
            exit 1
          fi
          if [ "$tag" != "$lock_ver" ]; then
            echo "::error::tag $tag does not match Cargo.lock claudette version $lock_ver — run 'cargo update -p claudette' and commit the lockfile"
            exit 1
          fi

  publish:
    name: cargo publish (crates.io)
    runs-on: ubuntu-latest
    needs: [verify, tag-version-match]
    # Tag-push only — never publish on workflow_dispatch dry-runs.
    if: github.event_name == 'push'
    # OIDC exchange needs id-token:write.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - name: Exchange OIDC token for crates.io publish token
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18  # v1.0.5
        id: auth
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # Idempotent publish: if the version is already on crates.io (e.g. a
        # manual `cargo publish` before tagging, or a workflow re-run), treat
        # the "already exists/uploaded" error as success instead of failing the
        # job. Previously this red X also skipped the `release` job via its
        # `needs: [publish]`, silently shipping NO GitHub binaries for the tag
        # (happened on v0.7.0 / v0.8.0 / v0.8.1). `release` is now decoupled
        # too, but keep publish green when the crate is already up. (roast 2026-06-02)
        run: |
          set +e
          out="$(cargo publish --locked -p claudette 2>&1)"
          code=$?
          echo "$out"
          if [ $code -ne 0 ]; then
            if echo "$out" | grep -qiE 'already (exists|uploaded)'; then
              echo "::notice::version already on crates.io — treating as success (idempotent publish)"
              exit 0
            fi
            exit $code
          fi

  build-binaries:
    name: build ${{ matrix.target }}
    needs: [verify, tag-version-match]
    # Five archives total: win-x64, linux-x64, linux-arm64, macos-x64,
    # macos-arm64. linux-arm64 uses GitHub's free arm64 runner. macOS x64
    # cross-compiles from macos-latest (Apple Silicon) via the universal
    # Xcode SDK — the macos-13 (Intel) free-tier runner pool starves for
    # hours at a time and was the cause of the v0.5.3 release being cut
    # manually. cc-rs picks the right sysroot from `--target` so the
    # `rusqlite/bundled` C build cross-compiles transparently.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: x86_64-unknown-linux-gnu,  ext: tar.gz }
          - { os: ubuntu-24.04-arm,  target: aarch64-unknown-linux-gnu, ext: tar.gz }
          - { os: macos-latest,      target: aarch64-apple-darwin,      ext: tar.gz }
          - { os: macos-latest,      target: x86_64-apple-darwin,       ext: tar.gz }
          - { os: windows-latest,    target: x86_64-pc-windows-msvc,    ext: zip    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: cargo build --release --locked
        run: cargo build --release --locked -p claudette --target ${{ matrix.target }}
      - name: Package archive + SHA256
        id: pkg
        shell: bash
        # Run under bash on every runner. Windows runners ship Git Bash
        # which provides `tar` and `7z` but only `sha256sum` (no `shasum`);
        # macOS ships `shasum` (perl-based) but no `sha256sum`; Linux ships
        # both. Try `shasum` first, fall back to `sha256sum` — output
        # format ("<hash>  <filename>") is identical between the two.
        run: |
          set -euo pipefail
          # On tag push: GITHUB_REF=refs/tags/v0.5.4 -> version=0.5.4.
          # On workflow_dispatch: no tag, so use a `dev-<short-sha>` stamp
          # so the archive name stays slash-free and the dry-run is
          # distinguishable from a real release.
          if [ "${GITHUB_REF#refs/tags/v}" != "${GITHUB_REF}" ]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="dev-${GITHUB_SHA:0:7}"
          fi
          stem="claudette-v${version}-${{ matrix.target }}"
          mkdir -p dist staging
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/claudette.exe" staging/
            (cd staging && 7z a "../dist/${stem}.zip" claudette.exe >/dev/null)
          else
            cp "target/${{ matrix.target }}/release/claudette" staging/
            chmod +x "staging/claudette"
            tar -C staging -czf "dist/${stem}.tar.gz" claudette
          fi
          archive="${stem}.${{ matrix.ext }}"
          cd dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "$archive.sha256"
          else
            sha256sum "$archive" > "$archive.sha256"
          fi
          echo "stem=${stem}" >> "$GITHUB_OUTPUT"
      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.pkg.outputs.stem }}
          path: |
            dist/${{ steps.pkg.outputs.stem }}.${{ matrix.ext }}
            dist/${{ steps.pkg.outputs.stem }}.${{ matrix.ext }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release (attach binaries)
    runs-on: ubuntu-latest
    # Decoupled from `publish`: the GitHub Release (binaries + SHA256 sidecars)
    # is independent of crates.io, so a publish hiccup must NOT skip it.
    # `build-binaries` transitively requires `verify` + `tag-version-match`.
    # (roast 2026-06-02 — was `needs: [publish, build-binaries]`, which dropped
    # binaries for three consecutive tags when publish failed on already-exists.)
    needs: [build-binaries]
    # Tag-push only — workflow_dispatch dry-runs stop after build-binaries
    # so the archives are inspectable via the workflow run's artifacts tab
    # without creating a GitHub Release.
    if: github.event_name == 'push'
    # Creating the release + attaching files needs contents:write.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Inspect collected artifacts
        run: ls -la dist
      - name: Create GitHub Release with binaries attached
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            dist/claudette-v*.tar.gz
            dist/claudette-v*.tar.gz.sha256
            dist/claudette-v*.zip
            dist/claudette-v*.zip.sha256
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
