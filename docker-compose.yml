# docker-compose.yml — turnkey deploy of claudette + ollama on a single
# host (VPS, Raspberry Pi, home server). Optimised for the Telegram-bot
# use case: claudette runs forever, ollama keeps a small CPU brain hot.
#
# Quick start:
#   1. Copy .env.example to .env and set TELEGRAM_BOT_TOKEN.
#   2. docker compose up -d
#   3. docker compose exec ollama ollama pull qwen2.5:1.5b   # small CPU brain
#   4. Send your bot a message on Telegram.
#
# Storage:
#   - ollama-models : downloaded model weights (~2 GB per brain)
#   - claudette-data: sessions, notes, recall, missions, tokens
#
# Resource expectations on a 4 GB Pi 5 / $5 VPS with qwen2.5:1.5b:
#   ollama:     ~1.2 GB RAM idle, peaks ~1.6 GB during inference
#   claudette:  ~50 MB RAM steady-state

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment to expose Ollama to the host (useful for debugging from
    # the host machine). Default: ollama is reachable only from the
    # `claudette` service on the internal bridge network.
    # ports:
    #   - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  claudette:
    build: .
    image: claudette:latest
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      # The bridge-network hostname `ollama` isn't loopback, so claudette's
      # startup safety warning would fire on every container start.
      # Setting this acknowledges "yes, I configured the remote on purpose"
      # — silences the warning without weakening the protection elsewhere.
      CLAUDETTE_ALLOW_REMOTE_OLLAMA: "1"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN in .env}
      # Optional integrations — uncomment + set in .env if you want them.
      # BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      # GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # CLAUDETTE_MODEL: qwen2.5:1.5b     # pin a brain (matches CPU mode)
      # CLAUDETTE_MAX_FIX_ROUNDS: "4"     # forge fix-loop cap (default 2)
    volumes:
      - claudette-data:/home/claudette/.claudette
    command: ["--telegram"]

volumes:
  ollama-models:
  claudette-data:
